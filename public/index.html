<html lang="de">

    .lead-card{transition:all 0.2s;animation:fadeIn 0.3s ease}
    .lead-card:hover{transform:translateY(-2px)}
    .task-alert{animation:pulseBorder 2s infinite}
    .float-window{position:fixed;z-index:1000;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1)}

    .top-band{display:flex;flex-shrink:0;background:#fff;border-bottom:1px solid #E8E4DD}
    .kpi-item{display:flex;align-items:center;gap:10px;padding:10px 18px;border-right:1px solid #F0EDE8;cursor:pointer;transition:background 0.15s;flex:1}
    .kpi-item:hover{background:#FAFAF8}
    .kpi-item:last-child{border-right:none}
    .kpi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
    .modal-box{background:#fff;border-radius:18px;padding:28px;max-width:580px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.25)}

  </style>
</head>
