function extractSheetId(input){
  if(!input)return null;
  var m=input.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return m[1];
  if(/^[a-zA-Z0-9_-]{20,}$/.test(input.trim()))return input.trim();
  return null;
}
function getDupeReason(existing,lead){
  // Returns a description of WHY it's a duplicate, or null if not a dupe
  for(var i=0;i<existing.length;i++){
    var l=existing[i];
    if(l.inseratNr&&lead.inseratNr&&l.inseratNr===lead.inseratNr)
      return'Inserat-Nr. '+lead.inseratNr+' bereits vorhanden';
    if(l.fon&&lead.fon&&l.fon.replace(/[\s\-]/g,'')===lead.fon.replace(/[\s\-]/g,'')&&l.fon.length>6)
      return'Telefon '+lead.fon+' bereits vorhanden';
    if(l.strasse&&lead.strasse&&l.strasse.toLowerCase()===lead.strasse.toLowerCase()&&l.hausnummer===lead.hausnummer&&l.plz===lead.plz)
      return'Adresse '+lead.strasse+' '+lead.hausnummer+' bereits vorhanden';
    if(l.strasse&&lead.strasse&&l.strasse.toLowerCase()===lead.strasse.toLowerCase()&&l.ort===lead.ort&&l.objekttyp===lead.objekttyp&&l.preis===lead.preis&&lead.preis)
      return'Gleiche Adresse+Typ+Preis in '+lead.ort;
  }
  return null;
}
function isDuplicate(existing,lead){return getDupeReason(existing,lead)!==null;}

function saveColOrder(){localStorage.setItem("akquise_col_order",JSON.stringify(S.colOrder));}
function orderedColumns(){
  // Return COLUMNS in S.colOrder order, keeping any new columns at end
  var order=S.colOrder;
  var all=COLUMNS.map(function(c){return c.id;});
  // Merge: saved order first (filter out deleted), then any new columns not yet in order
  var merged=order.filter(function(id){return all.indexOf(id)>=0;});
  all.forEach(function(id){if(merged.indexOf(id)<0)merged.push(id);});
  return merged.map(function(id){return COLUMNS.find(function(c){return c.id===id;});}).filter(Boolean);
}

function updateLead(id,upds){
  S.leads=S.leads.map(function(l){
    if(l.id!=id)return l;
    var u=Object.assign({},l,upds);
    // Auto-move to Wiedervorlage & Tasks when WV or Task+Date is set from early stages
    var earlyStages=['lead','erstkontakt','nicht_erreicht'];
    if(earlyStages.indexOf(u.columnId)>=0){
      if(u.wiedervorlage||(u.task&&u.taskDue)){u.columnId='wiedervorlage_tasks';}
    }
    // Clear auto-move when both WV and Task are cleared
    if(u.columnId==='wiedervorlage_tasks'&&!u.wiedervorlage&&!u.task&&!u.taskDue){
      u.columnId='lead';
    }
    return u;
  });
  if(S.editingLead&&S.editingLead.id==id)S.editingLead=S.leads.find(function(l){return l.id==id;})||S.editingLead;
  saveLeads();
}

var TYP_MAP = {
  "ETW":"Eigentumswohnung","EFH":"Einfamilienhaus","MFH":"Mehrfamilienhaus",
  "DHH":"Doppelhaushälfte","RH":"Reihenmittelhaus","REH":"Reihenmittelhaus",
  "MAIS":"Eigentumswohnung","MAISONNETTE":"Eigentumswohnung",
  "PENTH":"Eigentumswohnung","PENTHOUSE":"Eigentumswohnung",

  "STADTHAUS":"Stadthaus","LANDHAUS":"Landhaus","REIHENHAUS":"Reihenmittelhaus"
};

function mapObjekttyp(raw){
  if(!raw)return"Einfamilienhaus";
  var u=raw.trim().toUpperCase();
  if(TYP_MAP[u])return TYP_MAP[u];
  // Try partial match
  var keys=Object.keys(TYP_MAP);
  for(var i=0;i<keys.length;i++){if(u.indexOf(keys[i])>=0)return TYP_MAP[keys[i]];}
  // Check against full names
  var full=["Einfamilienhaus","Mehrfamilienhaus","Reihenmittelhaus","Bungalow","Doppelhaushälfte","Villa","Landhaus","Stadthaus","Eigentumswohnung","Grundstück"];
  for(var j=0;j<full.length;j++){if(full[j].toLowerCase().indexOf(raw.trim().toLowerCase())>=0||raw.trim().toLowerCase().indexOf(full[j].toLowerCase())>=0)return full[j];}
  return"Einfamilienhaus";
}

function mapQuelle(raw){
  if(!raw)return"Sonstige";
  var l=raw.toLowerCase();
  if(l.indexOf("immoscout")>=0)return"Immoscout24";
  if(l.indexOf("immowelt")>=0)return"Immowelt";
  if(l.indexOf("immonet")>=0)return"Immonet";
  if(l.indexOf("ebay")>=0||l.indexOf("kleinanzeige")>=0)return"eBay Kleinanzeigen";
  if(l.indexOf("empfehlung")>=0||l.indexOf("referral")>=0)return"Empfehlung";
  if(l.indexOf("eigentümer")>=0||l.indexOf("eigentumer")>=0)return"Eigentümer direkt";
  return"Sonstige";
}

function parseCSVLine(line){
  var row=[],cur="",inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){row.push(cur.trim());cur="";}
    else cur+=ch;
  }
  row.push(cur.trim());
  return row;
}

function autoScore(lead){
  var s=20;
  if(lead.fon)s+=25;
  if(lead.preis)s+=15;
  if(lead.wohnflaeche)s+=10;
  if(lead.baujahr)s+=10;
  if(lead.notizen&&lead.notizen.length>5)s+=20;
  return Math.min(100,s);
}

function fetchViaGvizJSON(sheetId){
  return new Promise(function(resolve,reject){
    var cb='__gviz'+Date.now()+Math.floor(Math.random()*9999);
    var timer=setTimeout(function(){cleanup();reject(new Error('Timeout (10s)'));},10000);
    function cleanup(){clearTimeout(timer);delete window[cb];var s=document.getElementById(cb);if(s&&s.parentNode)s.parentNode.removeChild(s);}
    window[cb]=function(resp){
      cleanup();
      if(!resp||resp.status!=='ok'){reject(new Error(resp&&resp.errors?resp.errors[0].message:'Ungueltige Antwort'));return;}
      var cols=(resp.table.cols||[]).map(function(c){return(c.label||c.id||'').trim();});
      var rows=(resp.table.rows||[]).map(function(r){return(r.c||[]).map(function(cell){return cell&&cell.v!=null?String(cell.v):'';});});
      resolve({cols:cols,rows:rows});
    };
    var s=document.createElement('script');s.id=cb;
    s.src='https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?tqx=out:json&callback='+cb;
    s.onerror=function(){cleanup();reject(new Error('Script-Fehler (Sheet nicht oeffentlich?)'));};
    document.head.appendChild(s);
  });
}

      colIdx.ort        =col('ort','stadt');
      colIdx.objekttyp  =col('objekttyp','typ');
      colIdx.grundstueck=col('grundst\u00fccksfläche','grundfl.');
      colIdx.wohnflaeche=col('wohnfl\u00e4che','wohnfl.');
      colIdx.baujahr    =col('baujahr');

      colIdx.inseratLink=col('inseratslink');
      colIdx.inseratNr  =col('inserat-nr.','inseratnr');
      colIdx.publikation=col('publikationsdatum','datum');
      colIdx.vorname    =col('vorname');
      colIdx.nachname   =col('nachname');
      colIdx.mail       =col('mail','e-mail','email');

      colIdx.quelle     =col('quelle');
      colIdx.score      =col('score','lead score');
      colIdx.notizen    =col('notizen','gespr');

// ===================== FILE IMPORT =====================
function parseFileData(file){
  return new Promise(function(resolve,reject){
    var ext=file.name.split('.').pop().toLowerCase();
    var reader=new FileReader();
    if(ext==='csv'){
      reader.onload=function(e){
        var text=e.target.result;
        var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
        if(!lines.length){reject(new Error('Leere Datei'));return;}
        var cols=parseCSVLine(lines[0]);
        var rows=lines.slice(1).map(parseCSVLine);
        resolve({cols:cols,rows:rows});
      };
      reader.onerror=function(){reject(new Error('Lesefehler'));};
      reader.readAsText(file,'UTF-8');
    }else if(ext==='xlsx'||ext==='xls'){
      reader.onload=function(e){
        try{
          if(!window.XLSX){reject(new Error('Excel-Bibliothek nicht geladen'));return;}
          var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          if(!arr.length){reject(new Error('Leere Tabelle'));return;}
          var cols=(arr[0]||[]).map(String);
          var rows=arr.slice(1).filter(function(r){return r.some(function(c){return String(c).trim().length>0;});}).map(function(r){return r.map(String);});
          resolve({cols:cols,rows:rows});
        }catch(err){reject(new Error('Excel-Fehler: '+err.message));}
      };
      reader.onerror=function(){reject(new Error('Lesefehler'));};
      reader.readAsArrayBuffer(file);
    }else{
      reject(new Error('Nur .xlsx, .xls, .csv werden unterstützt'));
    }
  });
}

  function colFind(){

    for(var n=0;n<names.length;n++){
      var idx=headers.findIndex(function(h){return h===names[n]||h.indexOf(names[n])>=0;});
      if(idx>=0)return data.cols[idx];
    }
    return null;
  }
  var isNew=colFind('imvo id','imvo')!==null||(colFind('stadt')!==null&&colFind('typ')!==null);
  var mappings=isNew?[
    {label:'Inserat-Nr (IMVo ID)',src:colFind('imvo id','imvo')},
    {label:'Stadt / Ort',src:colFind('stadt')},

    {label:'Zimmer',src:colFind('zimmer')},
    {label:'Wohnfläche',src:colFind('wohnfl.')},
    {label:'Grundfläche',src:colFind('grundfl.')},
    {label:'Baujahr',src:colFind('baujahr')},
    {label:'Preis',src:colFind('preis')},

    {label:'Telefon',src:colFind('telefon','fon')},
    {label:'Gesprächsnotizen',src:colFind('gespr','notizen')}
  ]:[
    {label:'Straße',src:colFind('stra\u00dfe','strasse')},
    {label:'Hausnummer',src:colFind('hausnummer')},
    {label:'PLZ',src:colFind('postleitzahl','plz')},

  return{isNew:isNew,mappings:mappings,rowCount:data.rows.filter(function(r){return r.some(function(c){return c;});}).length};

// Build manual map (auto-detected indices, user can override in UI)
function buildInitialManualMap(data){
  var h=data.cols.map(function(c){return c.toLowerCase().replace(/\s+/g,' ').trim();});
  // Match if column contains ANY of the given keywords, or keyword contains column (fuzzy)
  function fi(){
    var names=Array.prototype.slice.call(arguments);
    for(var n=0;n<names.length;n++){
      var kw=names[n].toLowerCase();
      var idx=h.findIndex(function(c){return c===kw||c.indexOf(kw)>=0||kw.indexOf(c)>=0;});
      if(idx>=0)return idx;
    }
    return -1;
  }
  var isNew=fi('imvo','immo-id','inserat-id')>=0||(fi('stadt','city')>=0&&fi('typ','art','type')>=0&&fi('preis','price','kp')>=0);
  return{
    isNew:isNew,
    inseratNr:  fi('imvo','immo id','inserat-nr','inseratnr','objekt-nr','objektnr','expose'),
    strasse:    fi('stra\u00dfe','strasse','adresse','address','stra\u00dfe und'),
    hausnummer: fi('hausnummer','haus-nr','haus nr'),
    plz:        fi('postleitzahl','plz','zip'),
    ort:        fi('ort','stadt','city','gemeinde','standort','location'),
    stadtteil:  fi('stadtteil','bezirk','ortsteil','quarter'),
    objekttyp:  fi('immobilientyp','objekttyp','objektart','immobilienart','art','typ','type','wohnungstyp'),
    zimmer:     fi('zimmer','zi.','zi ','rooms','room'),
    wohnflaeche:fi('wohnfl\u00e4che','wohnfl.','wohnf','nutzfl\u00e4che','fl\u00e4che m','wohnungsfl\u00e4che','living'),
    grundstueck:fi('grundst\u00fcck','grundfl','grundfl.','plot','land'),
    baujahr:    fi('baujahr','bj ','bj.','erbaut','year built','bauj'),
    preis:      fi('kaufpreis','angebotspreis','gesamtpreis','preis','price','kp ','kp.'),
    quelle:     fi('quelle','portal','source','plattform','herkunft'),
    publikation:fi('ver\u00f6ffentlicht','eingestellt','publikation','datum','date','erstellt am','online seit'),
    anbieter:   fi('anbieter','makler','eigent\u00fcmer','kontaktperson','kontakt','ansprechpartner'),
    vorname:    fi('vorname','first name','firstname'),
    nachname:   fi('nachname','name','last name','surname'),
    mail:       fi('e-mail','email','mail','@'),
    fon:        fi('telefon','mobil','fon','tel.','tel ','phone','handy'),
    notizen:    fi('notiz','gespr\u00e4ch','kommentar','bemerkung','anmerkung','memo','hinweis'),
    status:     fi('status','verf\u00fcgbarkeit','aktiv','online/offline'),
    kategorie:  fi('kategorie','category','kanban','pipeline','stufe','phase','stage','spalte','column')
  };
}

// Map a raw "Kategorie" cell value to a COLUMNS id (case-insensitive, fuzzy)
function mapKategorieToColumn(raw){
  if(!raw)return null;
  var r=raw.toLowerCase().replace(/[\s_\-]/g,'');
  var pairs=[
    {id:'lead',         keys:['lead','leadeingegangen','neu','new','eingang']},
    {id:'erstkontakt',  keys:['erstkontakt','erstkontak','firstcontact','kontakt','kontaktiert']},
    {id:'nicht_erreicht',keys:['nichterreicht','nicherreicht','unerreicht','noreply','noanswer','keinekontakt']},
    {id:'wiedervorlage_tasks',keys:['wiedervorlage','wiederlage','task','tasks','followup','follow','wiederv']},
    {id:'termin',       keys:['termin','terminvorort','appointment','besichtigungstermin','vorort']},
    {id:'besichtigung', keys:['besichtigung','besich','viewing','begehung']},
    {id:'praesentation',keys:['praesentation','präsentation','presentation','praesentationstermin','präsentationstermin']},
    {id:'auftrag',      keys:['auftrag','auftraggeber','mandate','mandat','listed']},
    {id:'vermarktung',  keys:['vermarktung','vermarktungsstart','marketing','vermarkt']},
    {id:'verworfen',    keys:['verworfen','offline','inaktiv','rejected','abgelehnt','veraltet']},
    {id:'archiv',       keys:['archiv','verloren','archiviert','lost','closed','abgeschlossen']}
  ];
  for(var i=0;i<pairs.length;i++){
    var p=pairs[i];
    for(var k=0;k<p.keys.length;k++){
      var kw=p.keys[k];
      if(r===kw||r.indexOf(kw)>=0||kw.indexOf(r)>=0)return p.id;
    }
  }
  return null;
}

// Map leads using explicit column-index assignments
function mapLeadsFromManualMap(data, mm){
  function g(row,i){return i>=0&&i<row.length?(row[i]||'').trim():'';}
  var leads=[];
  for(var i=0;i<data.rows.length;i++){
    var row=data.rows[i];
    var inseratNr=g(row,mm.inseratNr);
    var strasse=g(row,mm.strasse);
    var ortRaw=g(row,mm.ort);
    var ort=ortRaw||'Offenbach';
    var fon=g(row,mm.fon);
    // skip empty rows (use ortRaw so the fallback doesn't mask truly empty rows)
    if(!inseratNr&&!strasse&&!ortRaw&&!fon&&!g(row,mm.preis))continue;
    var rawTyp=g(row,mm.objekttyp);
    var rawQ=g(row,mm.quelle);
    var preisRaw=g(row,mm.preis).replace(/\./g,'').replace(',','.');
    var preisClean=preisRaw.replace(/[^\d]/g,'');
    var notizen=g(row,mm.notizen);
    var anbieter=g(row,mm.anbieter);
    var stadtteil=g(row,mm.stadtteil);
    var zimmer=g(row,mm.zimmer);
    var extra=[];
    if(anbieter)extra.push('Anbieter: '+anbieter);
    if(stadtteil&&stadtteil!==ort)extra.push('Stadtteil: '+stadtteil);
    if(zimmer)extra.push('Zimmer: '+zimmer);
    var fullNotizen=[notizen].concat(extra).filter(Boolean).join(' | ');
    var statusRaw=g(row,mm.status).toLowerCase().trim();
    var kategorieRaw=g(row,mm.kategorie);
    // Status "offline" always wins → verworfen; otherwise use Kategorie column; fallback: lead
    var targetCol='lead';
    if(statusRaw==='offline'||statusRaw==='inaktiv'||statusRaw==='nicht verf\u00fcgbar'){
      targetCol='verworfen';
    }else{
      var kCol=mapKategorieToColumn(kategorieRaw);
      if(kCol)targetCol=kCol;
    }
    var lead={id:Date.now()+Math.random()+i,columnId:targetCol,
      strasse:strasse,hausnummer:g(row,mm.hausnummer),plz:g(row,mm.plz),ort:ort,
      objekttyp:mapObjekttyp(rawTyp)||'Eigentumswohnung',
      grundstueck:g(row,mm.grundstueck),wohnflaeche:g(row,mm.wohnflaeche),
      baujahr:g(row,mm.baujahr),preis:preisClean,inseratLink:'',inseratNr:inseratNr,
      publikation:g(row,mm.publikation),prioritaet:'warm',wiedervorlage:'',
      vorname:g(row,mm.vorname),nachname:g(row,mm.nachname),mail:g(row,mm.mail),fon:fon,
      quelle:mapQuelle(rawQ)||'Sonstige',score:0,notizen:fullNotizen,
      aktivitaeten:[],erstelltAm:todayDE(),_importedAt:todayISO()};
    lead.score=autoScore(lead);
    leads.push(lead);
  }
  return leads;
}

function handleFileSelected(file){
  if(!file)return;
  S.importFileName=file.name;
  S.importColPreview=null;
  S.importManualMap=null;
  S.importFileRawData=null;
  S.importStatus='file-loading';
  render();
  parseFileData(file).then(function(data){
    S.importFileRawData=data;
    S.importColPreview=buildColPreview(data);
    S.importManualMap=buildInitialManualMap(data);
    S.importStatus='file-preview';
    render();
  }).catch(function(e){
    S.importStatus='error:'+e.message;
    render();
  });
}

function doFileImport(){
  if(!S.importFileRawData){return;}
  S.importStatus='loading';render();
  var mm=S.importManualMap||buildInitialManualMap(S.importFileRawData);
  Promise.resolve(mapLeadsFromManualMap(S.importFileRawData,mm)).then(function(leads){
    var newL=[],dupL=[];
    leads.forEach(function(l){var r=getDupeReason(S.leads,l);if(r){l._dupeReason=r;dupL.push(l);}else newL.push(l);});
    S.importFetched=newL;S.importDupes=dupL;S.importDupeDecisions={};S.importStatus='ready';render();
  }).catch(function(e){S.importStatus='error:'+e.message;render();});
}

function doImportFetch(){
  var id=extractSheetId(S.importSheetInput);
  if(!id){S.importSheetError="Ungültige URL oder Sheet-ID";render();return;}
  S.importSheetError="";localStorage.setItem("last_sheet_url",S.importSheetInput);
  S.importStatus="loading";render();
  fetchSheetLeads(id).then(function(leads){
    var newL=[],dupL=[];
    leads.forEach(function(l){var r=getDupeReason(S.leads,l);if(r){l._dupeReason=r;dupL.push(l);}else newL.push(l);});
    S.importFetched=newL;S.importDupes=dupL;S.importDupeDecisions={};S.importStatus="ready";render();
  }).catch(function(e){S.importStatus="error:"+e.message;render();});
}

function handleImport(){
  var toImport=S.importFetched.slice();
  S.importDupes.forEach(function(d){if(S.importDupeDecisions[d.inseratNr||d.strasse]==="import")toImport.push(d);});
  S.leads=S.leads.concat(toImport);
  saveLeads();localStorage.setItem("import_interval",String(S.importInterval));
  if(S.autoImportTimer)clearInterval(S.autoImportTimer);
  if(S.importInterval>0){
    var sheetId=extractSheetId(S.importSheetInput||DEFAULT_SHEET_ID);
    S.autoImportTimer=setInterval(function(){
      fetchSheetLeads(sheetId).then(function(fresh){
        var added=fresh.filter(function(l){return!isDuplicate(S.leads,l);});
        if(added.length){S.leads=S.leads.concat(added);saveLeads();render();}
      }).catch(function(){});
    },S.importInterval*60*1000);
  }
  S.showImport=false;render();
}

var geoCache={};
var gmapsLoaded=false,gmapsCallbacks=[];

function loadGMaps(cb){
  if(window.google&&window.google.maps){cb();return;}
  gmapsCallbacks.push(cb);
  if(gmapsLoaded)return;
  gmapsLoaded=true;
  window.__gmaps_init=function(){gmapsCallbacks.forEach(function(fn){fn();});gmapsCallbacks=[];};
  var s=document.createElement("script");
  s.src="https://maps.googleapis.com/maps/api/js?key="+MAPS_API_KEY+"&callback=__gmaps_init";
  s.async=true;s.defer=true;document.head.appendChild(s);
}

function initMapInContainer(container){
  loadGMaps(function(){
    if(!container||!container.isConnected)return;
    mapInst=new window.google.maps.Map(container,{center:{lat:50.105,lng:8.76},zoom:11,streetViewControl:false,mapTypeControl:false,fullscreenControl:false});
    mapInfoW=new window.google.maps.InfoWindow();

      legendEl.style.display="flex";

function geocodeLead(lead){
  // Build best possible address from available data
  var parts=[];
  if(lead.strasse)parts.push(lead.strasse+(lead.hausnummer?" "+lead.hausnummer:""));
  if(lead.plz)parts.push(lead.plz);
  if(lead.ort)parts.push(lead.ort);
  parts.push("Deutschland");
  var addr=parts.join(", ");
  // Add tiny random jitter so city-only leads don't all stack on the same pixel
  var hasExact=!!(lead.strasse&&(lead.plz||lead.ort));
  if(geoCache[addr]){
    var c=geoCache[addr];
    if(!hasExact){c={lat:c.lat+(Math.random()-0.5)*0.008,lng:c.lng+(Math.random()-0.5)*0.008};}
    return Promise.resolve(c);
  }
  return new Promise(function(res){
    new window.google.maps.Geocoder().geocode({address:addr},function(results,status){
      if(status==="OK"&&results[0]){
        var l=results[0].geometry.location;
        var c={lat:l.lat(),lng:l.lng()};
        geoCache[addr]=c; // cache base coords
        if(!hasExact){c={lat:c.lat+(Math.random()-0.5)*0.008,lng:c.lng+(Math.random()-0.5)*0.008};}
        res(c);
      }else res(null);
    });
  });
}

function mkIcon(color,hl){
  return{path:window.google.maps.SymbolPath.CIRCLE,fillColor:color,fillOpacity:hl?1:0.85,strokeColor:hl?"#fff":color,strokeWeight:hl?3:1.5,scale:hl?14:10};
}

function updateMapMarkers(){
  if(!mapReady||!mapInst)return;
  var activeLeads=getFilteredLeads().filter(function(l){return l.columnId!=="archiv"&&l.columnId!=="verworfen";});
  var ids={};activeLeads.forEach(function(l){ids[String(l.id)]=true;});
  Object.keys(mapMarkers).forEach(function(id){if(!ids[id]){mapMarkers[id].setMap(null);delete mapMarkers[id];}});
  activeLeads.forEach(function(lead){
    if(!lead.strasse&&!lead.ort)return; // need at least a city
    var id=String(lead.id);
    var color=colColor(lead.columnId);
    geocodeLead(lead).then(function(coords){
      if(!coords||!mapInst)return;
      if(mapMarkers[id]){mapMarkers[id].setPosition(coords);mapMarkers[id].setIcon(mkIcon(color,false));}
      else{
        var markerTitle=lead.strasse?(lead.strasse+" "+lead.hausnummer):(lead.inseratNr?"Nr. "+lead.inseratNr:lead.ort);
        var m=new window.google.maps.Marker({position:coords,map:mapInst,icon:mkIcon(color,false),title:markerTitle});
        m.addListener("mouseover",function(){
          var priceStr=lead.preis?"<br/><strong style='color:#3AA86C;font-size:12px'>"+formatPrice(lead.preis)+"</strong>":"";
          var scoreStr=lead.score?"<br/><span style='font-size:10px;background:#EEF2FF;color:#6B7FD4;padding:1px 5px;border-radius:10px;font-weight:700'>Score: "+lead.score+"</span>":"";
          var titleLine=lead.strasse?(esc(lead.strasse)+" "+esc(lead.hausnummer)):(lead.inseratNr?"Nr. "+esc(lead.inseratNr):esc(lead.ort));
          var subLine=[(lead.plz||""),(lead.ort||""),(lead.objekttyp||"")].filter(Boolean).map(esc).join(" · ");
          mapInfoW.setContent("<div style='font-family:sans-serif;padding:4px 2px;max-width:200px'><strong>"+titleLine+"</strong><br/><span style='color:#666;font-size:11px'>"+subLine+"</span>"+priceStr+scoreStr+"</div>");
          mapInfoW.open(mapInst,m);
          m.setIcon(mkIcon(color,true));m.setZIndex(999);
          var card=document.querySelector("[data-lead-id='"+lead.id+"']");
          if(card)card.scrollIntoView({behavior:"smooth",block:"nearest"});
        });
        m.addListener("mouseout",function(){mapInfoW.close();m.setIcon(mkIcon(color,false));m.setZIndex(1);});
        m.addListener("click",function(){
          var card=document.querySelector("[data-lead-id='"+lead.id+"']");
          if(card)card.scrollIntoView({behavior:"smooth",block:"nearest"});
        });
        mapMarkers[id]=m;
      }
    });
  });
}

function buildMapWindow(){

    if(e.button!==0)return;e.preventDefault();e.stopPropagation();

// ===================== RENDER HELPERS =====================
function scoreBadge(score,lg){
  var sc=scoreColor(score||0);
  return'<span style="display:inline-flex;align-items:center;justify-content:center;border-radius:20px;font-size:'+(lg?13:10)+'px;font-weight:800;padding:'+(lg?"4px 10px":"2px 6px")+';background:'+sc.bg+';color:'+sc.text+';letter-spacing:0.2px">'+(score||0)+'</span>';
}

function pieChart(segments,size){
  size=size||110;
  var total=segments.reduce(function(s,x){return s+x.value;},0);
  if(!total)return'<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:#E2E8F0;display:flex;align-items:center;justify-content:center"><span style="font-size:9px;color:#94A3B8">Keine Daten</span></div>';
  var r=size/2,cx=r,cy=r,rad=r-8,cum=0;
  var paths=segments.map(function(seg){
    if(!seg.value)return"";
    var pct=seg.value/total,sa=cum*2*Math.PI-Math.PI/2;cum+=pct;var ea=cum*2*Math.PI-Math.PI/2;
    var x1=cx+rad*Math.cos(sa),y1=cy+rad*Math.sin(sa),x2=cx+rad*Math.cos(ea),y2=cy+rad*Math.sin(ea);
    return'<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+rad+','+rad+' 0 '+(pct>0.5?1:0)+',1 '+x2+','+y2+' Z" fill="'+seg.color+'"/>';
  }).join("");
  return'<svg width="'+size+'" height="'+size+'" style="border-radius:50%">'+paths+'</svg>';
}

function miniBar(value,max,color,label,count){
  var pct=max>0?(value/max)*100:0;
  return'<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:10px;color:#1a1f35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">'+esc(label)+'</span><span style="font-size:10px;font-weight:700;color:'+color+';margin-left:4px">'+count+'</span></div><div style="height:5px;background:#F0EDE8;border-radius:20px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:20px;transition:width 0.4s"></div></div></div>';
}

// ===================== GLOBAL SEARCH =====================
function searchLeads(q){
  if(!q||q.length<2)return[];
  var t=q.toLowerCase().replace(/[\s\-]/g,"");
  return S.leads.filter(function(l){
    var fon=(l.fon||"").replace(/[\s\-]/g,"");
    return(l.strasse&&l.strasse.toLowerCase().indexOf(q.toLowerCase())>=0)||
      (l.ort&&l.ort.toLowerCase().indexOf(q.toLowerCase())>=0)||
      (l.plz&&l.plz.indexOf(q)>=0)||
      (l.inseratNr&&l.inseratNr.toLowerCase().indexOf(q.toLowerCase())>=0)||
      (fon&&fon.indexOf(t)>=0)||
      (l.vorname&&l.vorname.toLowerCase().indexOf(q.toLowerCase())>=0)||
      (l.nachname&&l.nachname.toLowerCase().indexOf(q.toLowerCase())>=0)||
      (l.mail&&l.mail.toLowerCase().indexOf(q.toLowerCase())>=0)||
      (l.notizen&&l.notizen.toLowerCase().indexOf(q.toLowerCase())>=0);
  }).slice(0,8);
}

// ===================== WV / TASK HELPERS =====================
function formatDateDE(iso){if(!iso)return'';var p=iso.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function getAufgaben(){
  var isoNow=todayISO();
  var res=[];
  S.leads.forEach(function(l){
    if(l.columnId==='archiv'||l.columnId==='verworfen')return;
    if(l.wiedervorlage&&l.wiedervorlage<=isoNow)
      res.push({lead:l,type:'WV',date:l.wiedervorlage,overdue:l.wiedervorlage<isoNow,label:'Wiedervorlage'});
    if(l.task&&l.taskDue&&l.taskDue<=isoNow)
      res.push({lead:l,type:'Task',date:l.taskDue,overdue:l.taskDue<isoNow,label:l.task});
  });
  return res.sort(function(a,b){return a.date.localeCompare(b.date);});
}
function getOverdueItems(){return getAufgaben().filter(function(a){return a.overdue;});}
function leadTitle(l){return l.strasse?(l.strasse+(l.hausnummer?' '+l.hausnummer:'')):(l.inseratNr?'Nr. '+l.inseratNr:l.ort||'Lead');}

function renderColDrop(col, colLeads){
  var isOpen=S.colDropOpen===col.id;
  if(!isOpen)return'';
  var items=colLeads.length
    ?colLeads.map(function(l){
        var title=l.strasse?(l.strasse+(l.hausnummer?' '+l.hausnummer:'')):(l.inseratNr?'Nr. '+l.inseratNr:l.ort||'Lead');
        var sub=[(l.ort||''),(l.objekttyp||''),(l.preis?formatPrice(l.preis):'')].filter(Boolean).join(' · ');
        return'<div data-action="col-drop-pick" data-lead-id="'+l.id+'" style="padding:7px 12px;cursor:pointer;border-bottom:1px solid #F4F1EC" onmouseover="this.style.background=\'#F8FAFC\'" onmouseout="this.style.background=\'\'">'+
          '<p style="font-size:11px;font-weight:600;color:#1a1f35;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(title)+'</p>'+
          (sub?'<p style="font-size:10px;color:#94A3B8;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(sub)+'</p>':'')+
        '</div>';
      }).join('')
    :'<p style="font-size:11px;color:#94A3B8;text-align:center;padding:10px 0;margin:0">Keine Leads</p>';
  return'<div class="col-drop-menu" style="position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:600;background:#fff;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,0.14);border:1px solid #E2E8F0;max-height:280px;overflow-y:auto">'+ items+'</div>';
}

function renderKanban(){
  var filtered=getFilteredLeads();
  var oCols=orderedColumns();
  var cols=oCols.map(function(col){
    var colLeads=filtered.filter(function(l){return l.columnId===col.id;}).sort(function(a,b){return(b.score||0)-(a.score||0);});
    var isOver=S.dragOverCol===col.id&&!S.draggingColId;
    var isDropOpen=S.colDropOpen===col.id;
    var isDraggingThis=S.draggingColId===col.id;
    // drag handle shown when unlocked
    var dragHandle=S.colLocked?'':'<span data-drag-col-id="'+col.id+'" title="Spalte verschieben" style="cursor:grab;font-size:13px;color:'+col.color+';opacity:0.7;flex-shrink:0;line-height:1;user-select:none" draggable="false">⠿</span>';
    var header='<div style="position:relative;padding:9px 11px 7px;border-bottom:2px solid '+col.color+'40;flex-shrink:0">'+
      '<div style="display:flex;align-items:center;gap:4px">'+
        dragHandle+
        '<span style="font-size:10px;font-weight:700;color:'+col.color+';text-transform:uppercase;letter-spacing:0.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(col.label)+'</span>'+
        '<div style="display:flex;gap:4px;align-items:center;flex-shrink:0">'+
          (colLeads.length?'<button data-action="toggle-col-drop" data-col-id="'+col.id+'" title="Lead direkt auswählen" style="width:20px;height:20px;border-radius:5px;border:none;background:'+(isDropOpen?col.color:'rgba(0,0,0,0.06)')+';color:'+(isDropOpen?'#fff':col.color)+';cursor:pointer;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center">☰</button>':'')+
          '<span style="font-size:10px;font-weight:700;background:'+col.color+';color:#fff;border-radius:20px;padding:1px 6px">'+colLeads.length+'</span>'+
        '</div>'+
      '</div>'+
      renderColDrop(col,colLeads)+
    '</div>';
    return'<div data-col-id="'+col.id+'" draggable="'+(S.colLocked?'false':'true')+'" style="width:210px;flex-shrink:0;display:flex;flex-direction:column;background:'+(isOver?col.color+"15":"rgba(0,0,0,0.04)")+';border-radius:13px;border:'+(isOver?"2px dashed "+col.color:(isDraggingThis?"2px dashed "+col.color+"88":"2px solid transparent"))+';transition:all 0.15s;overflow:visible;opacity:'+(isDraggingThis?'0.45':'1')+'">'+header+'<div style="flex:1;overflow-y:auto;padding:7px">'+colLeads.map(function(lead){return renderLeadCard(lead,col);}).join("")+'</div></div>';
  }).join("");
  return'<div style="flex:1;overflow-x:auto;overflow-y:hidden;padding:8px 10px 10px"><div style="display:flex;gap:9px;height:100%;min-width:'+(oCols.length*219)+'px">'+cols+'</div></div>';
}

function renderStats(){
  var isoNow=todayISO(),leads=S.leads;
  var active=leads.filter(function(l){return l.columnId!=="archiv"&&l.columnId!=="verworfen";});
  var gewonnen=leads.filter(function(l){return l.columnId==="auftrag"||l.columnId==="vermarktung";}).length;
  var verloren=leads.filter(function(l){return l.columnId==="archiv";}).length;
  var verworfen=leads.filter(function(l){return l.columnId==="verworfen";}).length;
  var inPipeline=leads.filter(function(l){return["auftrag","vermarktung","archiv","verworfen"].indexOf(l.columnId)<0;}).length;
  var veraltetPct=leads.length>0?((verworfen/leads.length)*100).toFixed(1):"0.0";
  var totalValue=active.reduce(function(s,l){return s+(parseFloat(String(l.preis||"").replace(/[^\d]/g,""))||0);},0);
  var avgScore=active.length?Math.round(active.reduce(function(s,l){return s+(l.score||0);},0)/active.length):0;
  var conv=leads.length?((gewonnen/leads.length)*100).toFixed(1):"0.0";
  var qColors=["#6B7FD4","#F97316","#22C55E","#EAB308","#A855F7","#14B8A6","#EF4444","#94A3B8"];
  var qMap={};leads.forEach(function(l){qMap[l.quelle]=(qMap[l.quelle]||0)+1;});
  var qEntries=Object.entries(qMap).sort(function(a,b){return b[1]-a[1];});
  var tMap={};active.forEach(function(l){tMap[l.objekttyp]=(tMap[l.objekttyp]||0)+1;});
  var tEntries=Object.entries(tMap).sort(function(a,b){return b[1]-a[1];});
  var tMax=tEntries[0]?tEntries[0][1]:1;
  var prioMap={heiss:0,warm:0,kalt:0};active.forEach(function(l){prioMap[l.prioritaet]=(prioMap[l.prioritaet]||0)+1;});
  var wvOverdue=leads.filter(function(l){return l.wiedervorlage&&l.wiedervorlage<isoNow&&l.columnId!=="archiv"&&l.columnId!=="verworfen";}).length;
  var wvToday=leads.filter(function(l){return l.wiedervorlage===isoNow&&l.columnId!=="archiv"&&l.columnId!=="verworfen";}).length;
  var wvFuture=leads.filter(function(l){return l.wiedervorlage&&l.wiedervorlage>isoNow&&l.columnId!=="archiv"&&l.columnId!=="verworfen";}).length;
  var sBuckets=[
    {label:"80–100",sub:"TOP",color:"#DC2626",count:active.filter(function(l){return(l.score||0)>=80;}).length},
    {label:"60–79",sub:"HOCH",color:"#EA580C",count:active.filter(function(l){return(l.score||0)>=60&&(l.score||0)<80;}).length},
    {label:"40–59",sub:"MITTEL",color:"#CA8A04",count:active.filter(function(l){return(l.score||0)>=40&&(l.score||0)<60;}).length},
    {label:"20–39",sub:"OK",color:"#16A34A",count:active.filter(function(l){return(l.score||0)>=20&&(l.score||0)<40;}).length},
    {label:"0–19",sub:"NEU",color:"#64748B",count:active.filter(function(l){return(l.score||0)<20;}).length}
  ];
  var sMax=Math.max.apply(null,sBuckets.map(function(b){return b.count;}).concat([1]));
  var maxCol=Math.max.apply(null,COLUMNS.map(function(c){return leads.filter(function(l){return l.columnId===c.id;}).length;}).concat([1]));
  function kpi(icon,label,value,sub,color,bg){return'<div style="background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;gap:12px"><div style="width:42px;height:42px;border-radius:11px;background:'+(bg||"#F4F1EC")+';display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0">'+icon+'</div><div><p style="font-size:22px;font-weight:700;color:'+(color||"#1a1f35")+';font-family:\'Playfair Display\',serif;line-height:1.1">'+value+'</p><p style="font-size:10px;color:#94A3B8">'+label+'</p>'+(sub?'<p style="font-size:9px;color:#64748B;margin-top:1px">'+sub+'</p>':"")+'</div></div>';}
  function cc(title,content){return'<div style="background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,0.06)"><h3 style="font-family:\'Playfair Display\',serif;font-size:13px;color:#1a1f35;margin:0 0 12px">'+title+'</h3>'+content+'</div>';}
  return'<div style="flex:1;overflow-y:auto;padding:14px 18px"><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px">'+
    kpi("👥","Aktive Leads",active.length,"","#6B7FD4","#EEF2FF")+
    kpi("💶","Pipeline-Volumen",totalValue>0?(totalValue/1e6).toFixed(2)+" Mio €":"–",active.filter(function(l){return l.preis;}).length+" mit Preisangabe","#3AA86C","#F0FDF4")+
    kpi("⭐","Ø Lead-Score",avgScore,"von "+active.length+" Leads","#E8A838","#FFFBEB")+
    kpi("🏆","Konversionsrate",conv+"%",gewonnen+" Aufträge gesamt","#A855F7","#FDF4FF")+
    kpi("📴","Veraltet (offline)",veraltetPct+"%",verworfen+" Leads verworfen","#78716C","#F5F5F4")+
  '</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">'+
    cc("Gewonnen · Verloren · Pipeline · Veraltet",'<div style="display:flex;align-items:center;gap:12px">'+pieChart([{label:"Gewonnen",value:gewonnen,color:"#3AA86C"},{label:"Pipeline",value:inPipeline,color:"#6B7FD4"},{label:"Verloren",value:verloren,color:"#EF4444"},{label:"Veraltet",value:verworfen,color:"#78716C"}],100)+'<div>'+[{l:"Gewonnen",v:gewonnen,c:"#3AA86C"},{l:"Pipeline",v:inPipeline,c:"#6B7FD4"},{l:"Verloren",v:verloren,c:"#EF4444"},{l:"Veraltet (offline)",v:verworfen,c:"#78716C"}].map(function(x){return'<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px"><div style="width:8px;height:8px;border-radius:50%;background:'+x.c+'"></div><span style="font-size:10px;color:#64748B;flex:1">'+x.l+'</span><span style="font-size:11px;font-weight:700;color:'+x.c+'">'+x.v+'</span></div>';}).join("")+'<div style="border-top:1px solid #F4F1EC;margin-top:5px;padding-top:5px"><span style="font-size:9px;color:#64748B">Konversion: </span><span style="font-size:12px;font-weight:700;color:#3AA86C">'+conv+'%</span><span style="font-size:9px;color:#64748B;margin-left:8px">Veraltet: </span><span style="font-size:12px;font-weight:700;color:#78716C">'+veraltetPct+'%</span></div></div></div>')+
    cc("Prioritäts-Verteilung",'<div style="display:flex;align-items:center;gap:12px">'+pieChart([{label:"Heiß",value:prioMap.heiss,color:"#EF4444"},{label:"Warm",value:prioMap.warm,color:"#F59E0B"},{label:"Kalt",value:prioMap.kalt,color:"#3B82F6"}],100)+'<div>'+[{l:"🔴 Heiß",v:prioMap.heiss,c:"#EF4444"},{l:"🟡 Warm",v:prioMap.warm,c:"#F59E0B"},{l:"🔵 Kalt",v:prioMap.kalt,c:"#3B82F6"}].map(function(x){return'<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px"><span style="font-size:10px;color:#64748B;flex:1">'+x.l+'</span><span style="font-size:11px;font-weight:700;color:'+x.c+'">'+x.v+'</span></div>';}).join("")+'</div></div>')+
    cc("Leads nach Quelle",'<div style="display:flex;align-items:center;gap:10px">'+pieChart(qEntries.map(function(e,i){return{label:e[0],value:e[1],color:qColors[i%qColors.length]};}),100)+'<div style="flex:1;max-height:100px;overflow-y:auto">'+qEntries.map(function(e,i){return'<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px"><div style="width:7px;height:7px;border-radius:50%;background:'+qColors[i%qColors.length]+';flex-shrink:0"></div><span style="font-size:9px;color:#64748B;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(e[0])+'</span><span style="font-size:10px;font-weight:700;color:#1a1f35">'+e[1]+'</span></div>';}).join("")+'</div></div>')+
  '</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">'+
    cc("Pipeline-Trichter",COLUMNS.map(function(col){var c=leads.filter(function(l){return l.columnId===col.id;}).length;return miniBar(c,maxCol,col.color,col.label,c);}).join(""))+
    cc("Leads nach Objekttyp",'<div style="max-height:180px;overflow-y:auto">'+(!tEntries.length?'<p style="color:#94A3B8;font-size:11px">Keine Daten</p>':tEntries.map(function(e,i){return'<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:10px;color:#1a1f35">'+esc(e[0])+'</span><span style="font-size:10px;font-weight:700;color:'+qColors[i%qColors.length]+'">'+e[1]+'</span></div><div style="height:5px;background:#F4F1EC;border-radius:20px;overflow:hidden"><div style="height:100%;width:'+((e[1]/tMax)*100)+'%;background:'+qColors[i%qColors.length]+';border-radius:20px"></div></div></div>';}).join(""))+'</div>')+
    cc("Wiedervorlage-Übersicht",[{label:"⚠️ Überfällig",value:wvOverdue,color:"#EF4444",bg:"#FEE2E2"},{label:"⏰ Heute fällig",value:wvToday,color:"#E8A838",bg:"#FFFBEB"},{label:"📅 Zukünftig",value:wvFuture,color:"#6B7FD4",bg:"#EEF2FF"},{label:"❌ Keine gesetzt",value:active.filter(function(l){return!l.wiedervorlage;}).length,color:"#94A3B8",bg:"#F8FAFC"}].map(function(x){return'<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-radius:8px;background:'+x.bg+';margin-bottom:5px"><span style="font-size:11px;color:'+x.color+'">'+x.label+'</span><span style="font-size:14px;font-weight:700;color:'+x.color+';font-family:\'Playfair Display\',serif">'+x.value+'</span></div>';}).join(""))+
  '</div>'+cc("Lead-Score Verteilung (aktive Leads)",'<div style="display:flex;gap:10px">'+sBuckets.map(function(b){return'<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div><span style="font-size:11px;color:'+b.color+';font-weight:700">'+b.label+'</span><span style="font-size:9px;color:#94A3B8;display:block">'+b.sub+'</span></div><span style="font-size:13px;font-weight:700;color:'+b.color+'">'+b.count+'</span></div><div style="height:70px;background:#F8FAFC;border-radius:7px;display:flex;align-items:flex-end;padding:3px 3px 0"><div style="width:100%;background:'+b.color+';border-radius:5px 5px 0 0;height:'+((b.count/sMax)*100)+'%;min-height:'+(b.count>0?3:0)+'px;transition:height 0.4s"></div></div></div>';}).join("")+'</div>')+'</div>';
}

// ===================== RENDER ADD/IMPORT MODALS =====================

    '<input type="'+(type||"text")+'" data-new-field="'+field+'" value="'+esc(lead[field]||"")+'" style="width:100%;padding:8px;border-radius:8px;border:1px solid #E2E8F0;font-size:13px;outline:none">'+
  '</div>';}
  return'<p style="font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 7px">Objektdaten</p>'+

  '<div style="grid-column:1/-1"><p style="font-size:11px;color:#64748B;margin:0 0 4px">Objekttyp</p><select data-new-field="objekttyp" style="width:100%;padding:8px;border-radius:8px;border:1px solid #E2E8F0;font-size:13px">'+OBJEKTTYPEN.map(function(t){return'<option '+(lead.objekttyp===t?"selected":"")+'>'+esc(t)+'</option>';}).join("")+'</select></div>'+
  inp("Grundstück m²","grundstueck")+inp("Wohnfläche m²","wohnflaeche")+inp("Baujahr","baujahr")+inp("Preis","preis")+inp("Inserat-Nr.","inseratNr")+inp("Publikation","publikation")+inp("Inseratslink","inseratLink","text",true)+'</div>'+
  '<p style="font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 7px">Score &amp; Status</p>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><div><p style="font-size:11px;color:#64748B;margin:0 0 4px">Lead-Score (0–100)</p><div style="display:flex;align-items:center;gap:8px"><input type="range" min="0" max="100" data-new-field="score" value="'+(lead.score||0)+'" style="flex:1">'+scoreBadge(lead.score||0,"lg")+'</div></div>'+
  '<div><p style="font-size:11px;color:#64748B;margin:0 0 4px">Priorität</p><select data-new-field="prioritaet" style="width:100%;padding:8px;border-radius:8px;border:1px solid #E2E8F0;font-size:13px">'+PRIORITAETEN.map(function(p){return'<option value="'+p.value+'" '+(lead.prioritaet===p.value?"selected":"")+'>'+p.label+'</option>';}).join("")+'</select></div>'+
  '<div><p style="font-size:11px;color:#64748B;margin:0 0 4px">Wiedervorlage</p><input type="date" data-new-field="wiedervorlage" value="'+esc(lead.wiedervorlage)+'" style="width:100%;padding:8px;border-radius:8px;border:1px solid #E2E8F0;font-size:13px"></div>'+
  '<div><p style="font-size:11px;color:#64748B;margin:0 0 4px">Start-Spalte</p><select data-new-field="columnId" style="width:100%;padding:8px;border-radius:8px;border:1px solid #E2E8F0;font-size:13px">'+COLUMNS.map(function(c){return'<option value="'+c.id+'" '+(lead.columnId===c.id?"selected":"")+'>'+esc(c.label)+'</option>';}).join("")+'</select></div></div>'+
  '<p style="font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 7px">Kontaktdaten</p>'+

function renderImportModal(){
  if(!S.showImport)return"";
  var body="";
  if(S.importStatus==="loading"||S.importStatus==="file-loading")body='<div style="text-align:center;padding:28px 0"><div style="font-size:26px;margin-bottom:7px">⏳</div><p style="color:#64748B;font-size:13px">Wird geladen…</p></div>';
  else if(S.importStatus==="file-preview"&&S.importFileRawData&&S.importManualMap){
    var data=S.importFileRawData;
    var mm=S.importManualMap;
    var cols=data.cols;
    var sample=data.rows[0]||[];
    var rowCount=data.rows.filter(function(r){return r.some(function(c){return c;});}).length;
    // build dropdown for a given field key
    function colDrop(fieldKey,label,required){
      var cur=mm[fieldKey];
      var opts='<option value="-1"'+(cur===-1?' selected':'')+'>'+(required?'⚠ nicht zugeordnet':'— nicht importieren —')+'</option>'+
        cols.map(function(c,i){
          var ex=sample[i]?(' · "'+sample[i].substring(0,18)+(sample[i].length>18?'…':'')+'"'):'';
          return'<option value="'+i+'"'+(cur===i?' selected':'')+'>'+esc(c)+esc(ex)+'</option>';
        }).join('');
      return'<tr style="border-bottom:1px solid #F4F1EC">'+
        '<td style="padding:4px 8px;color:#1a1f35;font-size:11px;white-space:nowrap">'+
          (required?'<span style="color:#EF4444;font-weight:700" title="Empfohlen">*</span> ':'')+esc(label)+
        '</td>'+
        '<td style="padding:4px 8px"><select data-mm="'+fieldKey+'" style="width:100%;padding:3px 6px;border-radius:6px;border:1px solid '+(cur>=0?"#86EFAC":"#E2E8F0")+';background:'+(cur>=0?"#F0FDF4":"#FAFAFA")+';font-size:11px;outline:none">'+opts+'</select></td>'+
      '</tr>';
    }
    var autoDetected=Object.keys(mm).filter(function(k){return k!=='isNew'&&mm[k]>=0;}).length;
    var totalFields=Object.keys(mm).filter(function(k){return k!=='isNew';}).length;
    var headerBg=autoDetected>=totalFields*0.5?"#F0FDF4":"#FFFBEB";
    var headerBorder=autoDetected>=totalFields*0.5?"#86EFAC":"#FDE68A";
    var headerColor=autoDetected>=totalFields*0.5?"#15803D":"#92400E";
    body='<div style="background:'+headerBg+';border:1px solid '+headerBorder+';border-radius:9px;padding:9px 13px;margin-bottom:10px">'+
      '<p style="font-size:12px;font-weight:600;color:'+headerColor+';margin:0">📋 '+esc(S.importFileName)+' — '+rowCount+' Zeilen · '+cols.length+' Spalten · '+autoDetected+'/'+totalFields+' automatisch erkannt</p>'+
      '<p style="font-size:10px;color:'+headerColor+';margin:3px 0 0">Grüne Felder = automatisch erkannt. Weiße Felder = bitte manuell zuordnen.</p>'+
    '</div>'+
    '<div style="max-height:300px;overflow-y:auto;margin-bottom:12px"><table style="width:100%;border-collapse:collapse">'+
      '<thead><tr style="background:#F8FAFC;position:sticky;top:0"><th style="padding:5px 8px;text-align:left;color:#64748B;font-size:10px;font-weight:700;border-bottom:1px solid #E2E8F0">CRM-Feld</th><th style="padding:5px 8px;text-align:left;color:#64748B;font-size:10px;font-weight:700;border-bottom:1px solid #E2E8F0">Spalte in Datei (Beispielwert)</th></tr></thead>'+
      '<tbody>'+
        colDrop('inseratNr','Inserat-Nr. / IMVo-ID',false)+
        colDrop('strasse','Straße',false)+
        colDrop('hausnummer','Hausnummer',false)+
        colDrop('plz','PLZ',false)+
        colDrop('ort','Ort / Stadt',true)+
        colDrop('stadtteil','Stadtteil',false)+
        colDrop('objekttyp','Objekttyp / Typ',true)+
        colDrop('zimmer','Zimmer',false)+
        colDrop('wohnflaeche','Wohnfläche m²',false)+
        colDrop('grundstueck','Grundstücksfläche m²',false)+
        colDrop('baujahr','Baujahr',false)+
        colDrop('preis','Preis / Kaufpreis',true)+
        colDrop('quelle','Quelle / Portal',false)+
        colDrop('publikation','Datum / Publikation',false)+
        colDrop('anbieter','Anbieter / Kontakt',false)+
        colDrop('vorname','Vorname',false)+
        colDrop('nachname','Nachname',false)+
        colDrop('mail','E-Mail',false)+
        colDrop('fon','Telefon',false)+
        colDrop('notizen','Notizen / Kommentar',false)+
        colDrop('status','Status (online/offline → Spalte)',false)+
        colDrop('kategorie','Kategorie (→ Kanban-Spalte beim Import)',false)+
      '</tbody>'+
    '</table></div>'+
    '<div style="display:flex;gap:10px;justify-content:flex-end">'+
      '<button data-action="close-import" class="btn-secondary">Abbrechen</button>'+
      '<button data-action="do-file-import" class="btn-primary">'+rowCount+' Leads importieren</button>'+
    '</div>';
  }
  else if(S.importStatus.startsWith("error:"))body='<div style="background:#FFF5F5;border:1px solid #FCA5A5;border-radius:9px;padding:14px;margin-bottom:14px"><p style="color:#EF4444;font-size:13px;margin:0">Fehler: '+esc(S.importStatus.replace("error:",""))+'</p><p style="color:#94A3B8;font-size:11px;margin:6px 0 0">Stelle sicher dass die Datei nicht leer oder beschädigt ist.</p></div><div style="display:flex;justify-content:flex-end"><button data-action="close-import" class="btn-secondary">Schließen</button></div>';
  else if(S.importStatus==="ready")body='<div style="background:#F0FDF4;border:1px solid #86EFAC;border-radius:9px;padding:10px 14px;margin-bottom:14px"><p style="color:#15803D;font-size:13px;font-weight:600;margin:0">'+S.importFetched.length+' neue Leads · '+S.importDupes.length+' Duplikate</p></div>'+
    (S.importDupes.length?'<p style="font-size:12px;font-weight:600;color:#1a1f35;margin:0 0 7px">⚠ '+S.importDupes.length+' Duplikat'+(S.importDupes.length===1?'':'e')+' erkannt – trotzdem importieren?</p>'+
      '<div style="max-height:200px;overflow-y:auto;margin-bottom:10px">'+
      S.importDupes.map(function(d){

// ===================== MAIN RENDER =====================
function render(){
  var app=document.getElementById("app");
  if(!app)return;
  // Save focused input (so typing in search/filter keeps cursor after re-render)
  var prevFocusId=document.activeElement?document.activeElement.id:null;
  var prevFocusPos=(document.activeElement&&document.activeElement.selectionStart!=null)?document.activeElement.selectionStart:-1;
  // Save scroll positions
  var scrolls={};
  document.querySelectorAll("[data-col-id]").forEach(function(el){
    var inner=el.querySelector("div[style*='overflow-y:auto']")||el.querySelector("div[style*='overflow-y: auto']");
    if(inner)scrolls[el.dataset.colId]=inner.scrollTop;
  });
  app.innerHTML=S.auth?renderMain():renderLogin();
  // Restore scroll positions
  document.querySelectorAll("[data-col-id]").forEach(function(el){
    var inner=el.querySelector("div[style*='overflow-y:auto']")||el.querySelector("div[style*='overflow-y: auto']");
    if(inner&&scrolls[el.dataset.colId])inner.scrollTop=scrolls[el.dataset.colId];
  });
  if(S.auth)syncMapWindow();
  attachInputListeners();
  // Restore focus to any text input that was active before re-render
  if(prevFocusId){
    var prevEl=document.getElementById(prevFocusId);
    if(prevEl&&(prevEl.tagName==='INPUT'||prevEl.tagName==='TEXTAREA')){
      prevEl.focus();
      if(prevFocusPos>=0)try{prevEl.setSelectionRange(prevFocusPos,prevFocusPos);}catch(x){}
    }
  }
  // Auto-show overdue warning once per session
  if(!window._overdueShown&&getOverdueItems().length>0&&S.auth){
    window._overdueShown=true;S.showOverdueWarning=true;
  }
  if(S.scrollToLeadId){
    var targetCard=document.querySelector('[data-lead-id="'+S.scrollToLeadId+'"]');
    if(targetCard){
      targetCard.scrollIntoView({behavior:"smooth",block:"center"});
      targetCard.style.transition="box-shadow 0.3s";
      targetCard.style.boxShadow="0 0 0 3px #6B7FD4, 0 8px 24px rgba(107,127,212,0.4)";
      setTimeout(function(){if(targetCard)targetCard.style.boxShadow="";},2000);
    }
    S.scrollToLeadId=null;
  }
}

// ===================== INPUT LISTENERS (re-attached per render) =====================
function attachInputListeners(){
  // Login inputs
  var lu=document.getElementById("login-user");
  var lp=document.getElementById("login-pass");
  if(lu){lu.addEventListener("input",function(e){S.loginUser=e.target.value;});lu.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});}
  if(lp){lp.addEventListener("input",function(e){S.loginPass=e.target.value;});lp.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});}

  // Filter inputs
  var fs=document.getElementById("filter-search");
  if(fs){fs.addEventListener("input",function(e){S.filters.search=e.target.value;render();/* render() restores focus */});}
  var fq=document.getElementById("filter-quelle");
  if(fq)fq.addEventListener("change",function(e){S.filters.quelle=e.target.value;render();});
  var ft=document.getElementById("filter-typ");
  if(ft)ft.addEventListener("change",function(e){S.filters.objekttyp=e.target.value;render();});

  // Global search
  var gs=document.getElementById("global-search");
  if(gs){
    gs.addEventListener("input",function(e){
      S.searchQuery=e.target.value;
      render(); // render() now saves+restores focus automatically
    });
    gs.addEventListener("keydown",function(e){
      if(e.key==="Escape"){S.searchQuery="";render();}
    });
    gs.addEventListener("blur",function(){
      // Small delay so click on a search result can fire before we clear
      setTimeout(function(){
        var ng=document.getElementById("global-search");
        if(ng&&document.activeElement===ng)return; // still focused after re-render
        if(S.searchQuery){S.searchQuery="";render();}
      },200);
    });
  }

  // Sheet input
  var si=document.getElementById("sheet-input");
  if(si)si.addEventListener("input",function(e){S.importSheetInput=e.target.value;S.importSheetError="";});

  // File import input
  var fi=document.getElementById("file-import-input");
  if(fi)fi.addEventListener("change",function(e){if(e.target.files&&e.target.files[0])handleFileSelected(e.target.files[0]);});

  // Import interval
  var ii=document.getElementById("import-interval-sel");
  if(ii)ii.addEventListener("change",function(e){S.importInterval=parseInt(e.target.value);});

  // Delete modal checkboxes
  var delAll=document.getElementById("del-all-cb");
  if(delAll){
    delAll.addEventListener("change",function(e){
      var sel={};
      if(e.target.checked)S.leads.forEach(function(l){sel[l.id]=true;});
      S.deleteSelected=sel;render();
    });
  }
  document.querySelectorAll("[data-del-id]").forEach(function(cb){
    cb.addEventListener("change",function(e){
      S.deleteSelected[cb.dataset.delId]=e.target.checked;
      // Update "confirm-delete" button without full re-render
      var selCount=Object.keys(S.deleteSelected).filter(function(k){return S.deleteSelected[k];}).length;
      var btns=document.querySelectorAll('[data-action="confirm-delete"],[data-action="close-delete"]~[disabled]');
      // Lightweight: just re-render the modal footer
      render();
    });
  });

  // Manual column mapping dropdowns
  document.querySelectorAll("[data-mm]").forEach(function(el){
    el.addEventListener("change",function(e){
      if(S.importManualMap)S.importManualMap[el.dataset.mm]=parseInt(e.target.value);
      // update border color without full re-render
      el.style.borderColor=parseInt(e.target.value)>=0?"#86EFAC":"#E2E8F0";
      el.style.background=parseInt(e.target.value)>=0?"#F0FDF4":"#FAFAFA";
    });
  });

  // Dupe decisions
  document.querySelectorAll("[data-dupe-key]").forEach(function(el){
    el.addEventListener("change",function(e){S.importDupeDecisions[el.dataset.dupeKey]=e.target.value;render();});
  });

  // Lead field editing (inline card)
  if(S.editingLead){
    document.querySelectorAll("[data-field]").forEach(function(el){
      var field=el.dataset.field;
      el.addEventListener("change",function(e){
        var val=e.target.value;
        if(field==="score")val=parseInt(val);
        updateLead(S.editingLead.id,{[field]:val});
        render();
      });
      if(el.type==="range"){
        el.addEventListener("input",function(e){
          S.editingLead.score=parseInt(e.target.value);
          var badge=el.parentElement.querySelector("span");
          if(badge){var sc=scoreColor(S.editingLead.score);badge.style.background=sc.bg;badge.style.color=sc.text;badge.textContent=S.editingLead.score;}
        });
      }
    });
    // Move column select
    var moveCol=document.querySelector("[data-action='move-col']");
    if(moveCol)moveCol.addEventListener("change",function(e){moveLead(S.editingLead.id,e.target.value);});
  }

  // New lead fields
  document.querySelectorAll("[data-new-field]").forEach(function(el){
    var field=el.getAttribute("data-new-field");
    el.addEventListener(el.type==="range"||el.tagName==="SELECT"?"change":"input",function(e){
      var val=e.target.value;
      if(field==="score")val=parseInt(val);
      S.newLead[field]=val;
      if(field==="score"){
        var badge=el.parentElement.querySelector("span");
        if(badge){var sc=scoreColor(parseInt(val));badge.style.background=sc.bg;badge.style.color=sc.text;badge.textContent=val;}
      }
    });
  });

  // Activity inputs
  document.querySelectorAll("[id^='act-input-']").forEach(function(el){
    var lid=el.id.replace("act-input-","");
    el.addEventListener("input",function(e){S.newActivity[lid]=e.target.value;});
    el.addEventListener("keydown",function(e){if(e.key==="Enter")addActivity(lid);});
  });

  // KPI aufgaben click
  var kpiA=document.getElementById("kpi-aufgaben");
  if(kpiA)kpiA.addEventListener("click",function(e){
    if(e.target.closest('[data-action]'))return;
    S.showTaskDrop=!S.showTaskDrop;S.filterAufgaben=S.showTaskDrop;render();
  });

  // Lock toggle
  var colLockCb=document.getElementById("col-lock-cb");
  if(colLockCb){
    colLockCb.addEventListener("change",function(e){
      S.colLocked=e.target.checked;
      if(S.colLocked)S.draggingColId=null;
      render();
    });
  }

  // Drag & drop – leads
  document.querySelectorAll(".lead-card[draggable]").forEach(function(el){
    el.addEventListener("dragstart",function(e){
      if(S.draggingColId)return; // column drag takes priority
      S.dragId=el.dataset.leadId;e.dataTransfer.effectAllowed="move";
      e.stopPropagation(); // don't trigger column drag
    });
    el.addEventListener("dragend",function(){S.dragId=null;S.dragOverCol=null;render();});
  });

  // Drag & drop – columns (only when unlocked)
  document.querySelectorAll("[data-col-id]").forEach(function(colEl){
    colEl.addEventListener("dragstart",function(e){
      if(S.colLocked)return;
      // Only start column drag if user is NOT dragging a lead card
      if(e.target.closest&&e.target.closest('.lead-card'))return;
      if(!e.target.closest&&e.target.classList&&e.target.classList.contains('lead-card'))return;
      // Ensure colOrder is fully populated (handles newly added columns)
      S.colOrder=orderedColumns().map(function(c){return c.id;});
      S.draggingColId=colEl.dataset.colId;
      S.dragId=null;
      e.dataTransfer.effectAllowed="move";
    });
    colEl.addEventListener("dragenter",function(e){
      e.preventDefault();
      if(S.draggingColId&&S.draggingColId!==colEl.dataset.colId){
        // Swap columns in order
        var from=S.colOrder.indexOf(S.draggingColId);
        var to=S.colOrder.indexOf(colEl.dataset.colId);
        if(from>=0&&to>=0){
          var o=S.colOrder.slice();
          o[from]=colEl.dataset.colId;o[to]=S.draggingColId;
          S.colOrder=o;render();
        }
      }
    });
    colEl.addEventListener("dragover",function(e){
      e.preventDefault();
      if(S.draggingColId)return; // column dragging – no lead highlight
      if(S.dragOverCol!==colEl.dataset.colId){
        S.dragOverCol=colEl.dataset.colId;
        document.querySelectorAll("[data-col-id]").forEach(function(c){
          var col=COLUMNS.find(function(x){return x.id===c.dataset.colId;});
          if(col){c.style.background=S.dragOverCol===c.dataset.colId?col.color+"15":"rgba(0,0,0,0.04)";c.style.border=S.dragOverCol===c.dataset.colId?"2px dashed "+col.color:"2px solid transparent";}
        });
      }
    });
    colEl.addEventListener("dragleave",function(e){
      if(S.draggingColId)return;
      if(!colEl.contains(e.relatedTarget)){
        S.dragOverCol=null;
        document.querySelectorAll("[data-col-id]").forEach(function(c){var col=COLUMNS.find(function(x){return x.id===c.dataset.colId;});if(col){c.style.background="rgba(0,0,0,0.04)";c.style.border="2px solid transparent";}});
      }
    });
    colEl.addEventListener("drop",function(e){
      e.preventDefault();
      if(S.draggingColId){S.draggingColId=null;saveColOrder();render();return;}
      if(S.dragId){moveLead(S.dragId,colEl.dataset.colId);}
      S.dragId=null;S.dragOverCol=null;
    });
    colEl.addEventListener("dragend",function(){
      if(S.draggingColId){S.draggingColId=null;saveColOrder();render();return;}
      S.dragId=null;S.dragOverCol=null;render();
    });
  });
}

// ===================== GLOBAL CLICK HANDLER (set up once) =====================
function doLogin(){
  if(S.loginUser==="admin"&&S.loginPass==="akquise2025"){S.auth=true;S.loginErr="";}
  else S.loginErr="Ungültige Anmeldedaten.";
  render();
}

document.addEventListener("click",function(e){
  // Close task dropdown on outside click
  if(S.showTaskDrop){
    var inTask=e.target.closest('[id="aufgaben-kpi-wrap"]')||e.target.closest('[data-action="done-task"]')||e.target.closest('[data-action="open-task-drop"]');
    if(!inTask){S.showTaskDrop=false;render();}
  }
  // Close modal overlay
  // Close column dropdown when clicking outside
  if(S.colDropOpen){
    var inDrop=e.target.closest(".col-drop-menu")||e.target.closest('[data-action="toggle-col-drop"]')||e.target.closest('[data-action="col-drop-pick"]');
    if(!inDrop){S.colDropOpen=null;render();return;}
  }
  if(e.target.classList&&e.target.classList.contains("modal-overlay")){
    S.showImport=false;S.showAdd=false;S.showDelete=false;render();return;
  }
  var btn=e.target.closest("[data-action]");
  if(!btn)return;
  var action=btn.dataset.action;

  if(action==="login"){doLogin();return;}
  if(action==="logout"){S.auth=false;render();return;}
  // WV picker
  if(action==="open-wv-picker"){S.wvPickerLeadId=btn.dataset.leadId===S.wvPickerLeadId?null:btn.dataset.leadId;S.taskPickerLeadId=null;render();return;}
  if(action==="close-wv-picker"){S.wvPickerLeadId=null;render();return;}
  if(action==="save-wv"){
    var wvInp=document.getElementById("wv-date-inp-"+btn.dataset.leadId);
    if(wvInp){updateLead(btn.dataset.leadId,{wiedervorlage:wvInp.value});S.wvPickerLeadId=null;render();}
    return;
  }
  if(action==="clear-wv"){updateLead(btn.dataset.leadId,{wiedervorlage:""});S.wvPickerLeadId=null;render();return;}
  // Task picker
  if(action==="open-task-picker"){S.taskPickerLeadId=btn.dataset.leadId===S.taskPickerLeadId?null:btn.dataset.leadId;S.wvPickerLeadId=null;render();return;}
  if(action==="close-task-picker"){S.taskPickerLeadId=null;render();return;}
  if(action==="save-task"){
    var tInp=document.getElementById("task-text-inp-"+btn.dataset.leadId);
    var tDue=document.getElementById("task-due-inp-"+btn.dataset.leadId);
    var tType=document.querySelector('[name="tdt-'+btn.dataset.leadId+'"]:checked');
    if(tInp){updateLead(btn.dataset.leadId,{task:tInp.value,taskDue:tDue?tDue.value:"",taskDueType:tType?tType.value:"am"});S.taskPickerLeadId=null;render();}
    return;
  }
  if(action==="clear-task"){updateLead(btn.dataset.leadId,{task:"",taskDue:"",taskDueType:"am"});S.taskPickerLeadId=null;render();return;}
  // Task dropdown & overdue
  if(action==="open-task-drop"||action==="kpi-aufgaben-btn"){S.showTaskDrop=!S.showTaskDrop;S.showOverdueWarning=false;render();return;}
  if(action==="open-overdue"){S.showOverdueWarning=true;S.showTaskDrop=false;render();return;}
  if(action==="close-overdue"){S.showOverdueWarning=false;render();return;}
  if(action==="done-task"){
    var dLid=btn.dataset.leadId;var dType=btn.dataset.taskType;
    if(dType==="WV")updateLead(dLid,{wiedervorlage:""});
    else updateLead(dLid,{task:"",taskDue:"",taskDueType:"am"});
    render();return;
  }
  if(action==="toggle-col-drop"){
    var cid=btn.dataset.colId;
    S.colDropOpen=S.colDropOpen===cid?null:cid;
    render();return;
  }
  if(action==="col-drop-pick"){
    var lid=btn.dataset.leadId||(btn.closest("[data-lead-id]")&&btn.closest("[data-lead-id]").dataset.leadId);
    var pl=S.leads.find(function(l){return String(l.id)===String(lid);});
    if(pl){S.colDropOpen=null;S.expandedCard=pl.id;S.editingLead=JSON.parse(JSON.stringify(pl));S.scrollToLeadId=pl.id;render();}
    return;
  }
  if(action==="open-delete"){S.showDelete=true;S.deleteSelected={};render();return;}
  if(action==="close-delete"){S.showDelete=false;S.deleteSelected={};render();return;}
  if(action==="confirm-delete"){
    var toDelete=Object.keys(S.deleteSelected).filter(function(k){return S.deleteSelected[k];});
    if(toDelete.length===0)return;
    if(!confirm(toDelete.length+' Lead'+(toDelete.length===1?'':'s')+' wirklich löschen?'))return;
    S.leads=S.leads.filter(function(l){return!S.deleteSelected[l.id];});
    saveLeads();S.showDelete=false;S.deleteSelected={};render();
    return;
  }
  if(action==="search-clear"){S.searchQuery="";render();return;}
  if(action==="search-pick"){
    var pickId=el.dataset.leadId||el.closest("[data-lead-id]")&&el.closest("[data-lead-id]").dataset.leadId;
    var picked=S.leads.find(function(l){return String(l.id)===String(pickId);});
    if(picked){
      S.searchQuery="";
      S.activeView="kanban";
      S.filters={prioritaet:"all",quelle:"all",objekttyp:"all",search:""};
      S.filterAufgaben=false;
      S.expandedCard=picked.id;
      S.editingLead=JSON.parse(JSON.stringify(picked));
      S.scrollToLeadId=picked.id;
      render();
    }
    return;
  }
  if(action==="view:kanban"){S.activeView="kanban";render();return;}
  if(action==="view:stats"){S.activeView="stats";render();return;}
  if(action==="toggle-map"){S.map.visible=!S.map.visible;saveMapWin();render();syncMapWindow();return;}
  if(action==="export-csv"){exportCSV();return;}
  if(action==="open-import"){S.showImport=true;S.importStatus="idle";render();return;}
  if(action==="close-import"){S.showImport=false;S.importFileRawData=null;S.importFileName="";S.importColPreview=null;S.importManualMap=null;render();return;}
  if(action==="do-file-import"){doFileImport();return;}
  if(action==="open-add"){S.showAdd=true;S.newLead=createLead();render();return;}
  if(action==="close-add"){S.showAdd=false;render();return;}
  if(action==="save-lead"){addLead();return;}
  if(action==="fetch-sheet"){
    var si=document.getElementById("sheet-input");
    if(si)S.importSheetInput=si.value;
    // Reset file state so Sheets result shows cleanly
    S.importFileRawData=null;S.importFileName="";S.importColPreview=null;S.importManualMap=null;
    doImportFetch();
    return;
  }
  if(action==="do-import"){var iis=document.getElementById("import-interval-sel");if(iis)S.importInterval=parseInt(iis.value);handleImport();return;}
  if(action&&action.startsWith("prio:")){S.filters.prioritaet=action.replace("prio:","");render();return;}
  if(action==="filter-reset"){S.filters={prioritaet:"all",quelle:"all",objekttyp:"all",search:""};S.filterAufgaben=false;render();return;}

  // Lead actions
  var card=btn.closest("[data-lead-id]");
  var leadId=card?card.dataset.leadId:null;
  if(!leadId)return;

  if(action==="toggle-expand"){
    var isExp=S.expandedCard==leadId;
    S.expandedCard=isExp?null:leadId;
    S.editingLead=isExp?null:Object.assign({},S.leads.find(function(l){return l.id==leadId;}));
    render();return;
  }
  if(action==="delete-lead"){if(confirm("Lead wirklich löschen?")){deleteLead(leadId);}return;}
  if(action==="add-activity"){addActivity(leadId);return;}
  if(action==="call-log"){logCall(leadId);return;}
});

// ===================== START =====================
render();
</script>
